name: Update README cards

on:
  workflow_dispatch: # Vẫn giữ để bạn có thể bấm nút chạy thủ công bất cứ lúc nào
  schedule:
    - cron: '0 0 * * 0' # 🚀 TỰ ĐỘNG CHẠY VÀO 00:00 CHỦ NHẬT HÀNG TUẦN (Giờ UTC)

# Cấp quyền GHI cho bot để nó có thể push file lên Github
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate GitHub Stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=dracula&hide_border=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Top Languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&show_icons=true&theme=dracula&hide_border=true&layout=compact
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate GitHub Trophies
        uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          username: ${{ github.repository_owner }}
          path: profile/trophy.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          # theme: dracula # Bỏ dấu # ở đầu dòng này nếu bạn muốn đổi sang theme dracula cho đồng bộ

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards and trophies weekly" || exit 0
          git push
